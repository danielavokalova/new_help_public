<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background for taskbar/desktop icon -->
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- GOL IBE compass logo — scaled from 64×64 original, centred at 256,256 -->
  <g transform="translate(76, 76) scale(5.625)">
    <defs>
      <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ff4d4d"/>
        <stop offset="100%" stop-color="#d93838"/>
      </linearGradient>
    </defs>
    <circle cx="32" cy="32" r="30" fill="#0b4db8"/>
    <circle cx="32" cy="32" r="23" fill="url(#ring)"/>
    <circle cx="32" cy="32" r="12" fill="#ffffff"/>
    <rect x="29" y="7"  width="6" height="14" rx="2" fill="#ffffff"/>
    <rect x="29" y="43" width="6" height="14" rx="2" fill="#ffffff"/>
    <rect x="43" y="29" width="14" height="6"  rx="2" fill="#ffffff"/>
    <rect x="7"  y="29" width="14" height="6"  rx="2" fill="#ffffff"/>
  </g>
</svg>
