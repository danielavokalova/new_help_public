<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background -->
  <rect width="512" height="512" fill="#ffffff"/>

  <defs>
    <!-- Clip S-curves to inner circle so ring draws cleanly on top -->
    <clipPath id="ic">
      <circle cx="256" cy="300" r="108"/>
    </clipPath>
  </defs>

  <!-- Globe swirl: two S-curves crossing through centre -->
  <path d="M 148,300 C 200,178 312,422 364,300"
        fill="none" stroke="#000000" stroke-width="36" clip-path="url(#ic)"/>
  <path d="M 148,300 C 200,422 312,178 364,300"
        fill="none" stroke="#000000" stroke-width="36" clip-path="url(#ic)"/>

  <!-- Outer ring drawn on top to cover clip-boundary artefacts -->
  <circle cx="256" cy="300" r="128" fill="none" stroke="#000000" stroke-width="40"/>

  <!-- Airplane: side view, pointing upper-right ~25°, tail near top of globe -->
  <g transform="translate(268, 150) rotate(-25)">
    <!-- Fuselage -->
    <path d="M -60,0 C -48,-12 30,-14 72,0 C 30,14 -48,12 -60,0 Z" fill="#000000"/>
    <!-- Swept-back main wing -->
    <path d="M 5,-14 L 36,-54 L 60,-50 L 24,-10 Z" fill="#000000"/>
    <!-- Vertical tail fin -->
    <path d="M -50,-1 L -66,-26 L -52,-23 L -47,-1 Z" fill="#000000"/>
    <!-- Horizontal stabiliser -->
    <path d="M -47,1 L -68,14 L -53,12 L -46,1 Z" fill="#000000"/>
  </g>
</svg>
